name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if publish is needed
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view kimiflare version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL"  >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Will publish $LOCAL (npm latest is $REMOTE)"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Already on npm as $REMOTE; skipping."
          fi

      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.check.outputs.local }}"
          gh release create "$TAG" --generate-notes --title "$TAG" || true
