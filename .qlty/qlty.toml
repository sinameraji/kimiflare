#
# For a guide to configuration, visit https://qlty.sh/d/config
# Or for a full reference, visit https://qlty.sh/d/qlty-toml
config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/.yarn/**",
  "**/*.d.ts",
  "**/assets/**",
  "**/bower_components/**",
  "**/build/**",
  "**/cache/**",
  "**/config/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/extern/**",
  "**/external/**",
  "**/generated/**",
  "**/Godeps/**",
  "**/gradlew/**",
  "**/mvnw/**",
  "**/node_modules/**",
  "**/protos/**",
  "**/seed/**",
  "**/target/**",
  "**/templates/**",
  "**/testdata/**",
  "**/vendor/**",
  # Terminal capture scripts intentionally use ANSI control characters
  "**/scripts/capture-terminal.*",
  "**/scripts/convert-ansi.*",
  "**/src/ui/sanitize-output.ts",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

[[source]]
name = "default"
default = true


[[plugin]]
name = "actionlint"

[[plugin]]
name = "hadolint"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "radarlint-iac"
mode = "monitor"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "zizmor"

# Note: eslint is disabled because qlty's isolated toolchain cannot resolve
# typescript-eslint from the project's node_modules. oxc provides equivalent
# TypeScript-aware linting natively.
[[plugin]]
name = "prettier"

[[plugin]]
name = "oxc"
